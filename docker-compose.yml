version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api:/app

  celery-worker:
    build: ./apps/api
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build: ./apps/api
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app beat --loglevel=info

volumes:
  redis_data:
